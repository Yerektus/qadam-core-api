spring.application.name=qadam-core-api
spring.config.import=optional:file:./qadam-core-api/.env[.properties]

# в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ R2DBC в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
spring.r2dbc.url=${R2DBC_URL:r2dbc:postgresql://localhost:5432/legaldb}
spring.r2dbc.username=${DB_USERNAME:postgres}
spring.r2dbc.password=${DB_PASSWORD:secret}

# в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ Flyway (JDBC datasource) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
spring.flyway.url=${JDBC_URL:jdbc:postgresql://localhost:5432/legaldb}
spring.flyway.user=${DB_USERNAME:postgres}
spring.flyway.password=${DB_PASSWORD:secret}

# в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ JDBC DataSource (for PgVectorStore JdbcTemplate) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
spring.datasource.url=${JDBC_URL:jdbc:postgresql://localhost:5432/legaldb}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:secret}

# в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ Spring AI вЂ” Embedding в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
spring.ai.openai.api-key=${OPENROUTER_API_KEY:}
spring.ai.openai.base-url=${OPENROUTER_BASE_URL:https://openrouter.ai/api/v1}
spring.ai.openai.embedding.options.model=${OPENROUTER_EMBEDDING_MODEL:nvidia/llama-nemotron-embed-vl-1b-v2:free}

# в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ PgVector Store в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
spring.ai.vectorstore.pgvector.dimensions=${VECTORSTORE_PGVECTOR_DIMENSIONS:1536}
spring.ai.vectorstore.pgvector.distance-type=${VECTORSTORE_PGVECTOR_DISTANCE_TYPE:COSINE_DISTANCE}
spring.ai.vectorstore.pgvector.index-type=${VECTORSTORE_PGVECTOR_INDEX_TYPE:HNSW}
spring.ai.vectorstore.pgvector.initialize-schema=${VECTORSTORE_PGVECTOR_INITIALIZE_SCHEMA:false}

# в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ File Storage в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
storage.local.base-path=${STORAGE_LOCAL_BASE_PATH:./uploads}
storage.local.max-file-size-mb=${STORAGE_LOCAL_MAX_FILE_SIZE_MB:20}

# в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ OpenRouter в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
openrouter.api-key=${OPENROUTER_API_KEY:}
openrouter.base-url=${OPENROUTER_BASE_URL:https://openrouter.ai/api/v1}
openrouter.model=${OPENROUTER_MODEL:google/gemini-3.1-pro-preview}
openrouter.app-url=${OPENROUTER_APP_URL:https://yourdomain.com}

# в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ JWT в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ Rate Limiting в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
ratelimit.generation.capacity=${RATELIMIT_GENERATION_CAPACITY:10}
ratelimit.generation.refill-hours=${RATELIMIT_GENERATION_REFILL_HOURS:1}

# в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ Spring WebFlux в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
spring.codec.max-in-memory-size=${SPRING_CODEC_MAX_IN_MEMORY_SIZE:25MB}

client.allowed-origins=${CLIENT_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001,http://127.0.0.1:3000,http://127.0.0.1:3001,http://localhost:4321,http://127.0.0.1:4321}
