version: '3.9'
services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: legal-postgres
    environment:
      POSTGRES_DB: legaldb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
